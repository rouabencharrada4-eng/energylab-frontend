<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>energylab-frontend</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("energylab-theme");
          var isDark = stored ? stored === "dark" : true; // default: dark
          document.documentElement.classList.toggle("dark", isDark);
        } catch (e) {}
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
